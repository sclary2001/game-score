<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean Clary Game Control Panel</title>
  <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
  <main>
    <h1>Sean Clary Game Simulator</h1>
    <p>This page simulates game actions with buttons.</p>

    <section>
      <button id="save-player-btn">Save Player</button>
      <button id="record-score-btn">Record High Score</button>
      <button id="reset-game-btn">Reset Game</button>
      <button id="view-leaderboard-btn">View Leaderboard</button>
    </section>

    <section>
      <h2>Status</h2>
      <div id="status-message">Ready.</div>
    </section>

    <section>
      <h2>Leaderboard</h2>
      <ol id="leaderboard-list"></ol>
    </section>

    <!-- REQUIRED LINKS -->
    <section>
      <h2>Links</h2>
      <p>
        <a href="https://validator.w3.org/nu/" target="_blank">
          Nu Validator
        </a>
      </p>
      <p>
        <a href="https://github.com/sclary2001/ target="_blank">
          My GitHub Repo
        </a>
      </p>
    </section>
  </main>

  <script type="module" src="./scripts/controllers/game-controller.js"></script>
</body>
</html>
